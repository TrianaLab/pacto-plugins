name: CI
description: Shared CI steps for a plugin — setup Go, lint, unit tests, e2e tests

inputs:
  plugin-dir:
    description: Path to the plugin directory (e.g. plugins/pacto-plugin-openapi-infer)
    required: true

runs:
  using: composite
  steps:
    - uses: actions/setup-go@v6.3.0
      with:
        go-version: '1.25'

    - uses: actions/cache@v5.0.3
      with:
        path: |
          ~/.cache/go-build
          ${{ env.GOPATH }}/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: cd ${{ inputs.plugin-dir }} && go mod download
      shell: bash

    - name: Check formatting
      run: cd ${{ inputs.plugin-dir }} && test -z "$(gofmt -l .)"
      shell: bash

    - name: Run go vet
      run: cd ${{ inputs.plugin-dir }} && go vet ./...
      shell: bash

    - name: Check cyclomatic complexity
      run: |
        go install github.com/fzipp/gocyclo/cmd/gocyclo@latest
        cd ${{ inputs.plugin-dir }}
        gocyclo -over 15 $(find . -name '*.go' ! -name '*_test.go' ! -path './vendor/*')
      shell: bash

    - name: Run linter
      uses: golangci/golangci-lint-action@v9.2.0
      with:
        working-directory: ${{ inputs.plugin-dir }}

    - name: Run unit tests
      run: cd ${{ inputs.plugin-dir }} && go test ./...
      shell: bash

    - name: Run e2e tests
      run: cd ${{ inputs.plugin-dir }} && make e2e
      shell: bash
